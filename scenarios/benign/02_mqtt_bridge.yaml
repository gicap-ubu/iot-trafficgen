scenario:
  name: "MQTT Bridge"
  description: "Connects MQTT broker to database, storing sensor data for analysis"
  category: "benign"
  
  markers:
    enabled: false

runs:
  - id: "mqtt_bridge"
    type: "benign"
    label: "MQTT_BRIDGE"
    script: "../../scripts/benign/MQTT_Bridge.py"
    
    env:
      # Required: Database host
      DB_HOST: "192.168.1.20_PLACEHOLDER"  # Database server IP address

      # Optional: Defaults aligned with the documented lab setup
      MQTT_BROKER: "localhost"
      MQTT_TOPIC: "planta/#"
      DB_USER: "admin_iot_PLACEHOLDER"
      DB_PASSWORD: "secreto_PLACEHOLDER"
      DB_NAME: "iot_db"