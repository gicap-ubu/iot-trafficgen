scenario:
  name: "Infrastructure Setup"
  description: "Verify and check web server and database services configuration"
  category: "benign"
  
  markers:
    enabled: false

runs:
  - id: "infrastructure_check"
    type: "benign"
    label: "INFRASTRUCTURE_CHECK"
    script: "../../scripts/benign/check_infrastructure.sh"
    
    env:
      # Default values correspond to the reference lab setup in docs/Installation.md
      # Users may replace them with their own database credentials
      DB_USER: "admin_iot_PLACEHOLDER"
      DB_PASSWORD: "secreto_PLACEHOLDER"
      DB_NAME: "iot_db"